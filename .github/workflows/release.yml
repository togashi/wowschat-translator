name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build Windows binary
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o dist/wowschat-translator-windows-amd64.exe ./cmd/wowschat-translator/

      - name: Build Linux binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags "-s -w" -o dist/wowschat-translator-linux-amd64 ./cmd/wowschat-translator/

      - name: Package distributable files
        run: |
          cp config.yaml.example dist/config.yaml.example
          cd dist
          zip -9 wowschat-translator-windows-amd64.zip wowschat-translator-windows-amd64.exe config.yaml.example
          tar czf wowschat-translator-linux-amd64.tar.gz wowschat-translator-linux-amd64 config.yaml.example

      - name: Generate checksums
        run: |
          cd dist
          sha256sum wowschat-translator-windows-amd64.zip wowschat-translator-linux-amd64.tar.gz > checksums-sha256.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/wowschat-translator-windows-amd64.zip
            dist/wowschat-translator-linux-amd64.tar.gz
            dist/checksums-sha256.txt
